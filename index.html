<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO X PRO | Tournament</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; user-select: none; }
        .page { display: none; min-height: 100vh; padding-bottom: 100px; }
        .page.active { display: block !important; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* PC & Mobile Responsiveness */
        .app-container {
            width: 100%;
            max-width: 450px; /* PC তে মোবাইলের মতো দেখাবে */
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }
        @media (max-width: 450px) { .app-container { max-width: 100%; box-shadow: none; } }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #m-ui { z-index: 99999; }
        nav { z-index: 100000; width: 100%; max-width: 450px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="m-ui" class="hidden fixed inset-0 bg-slate-900 flex flex-col items-center justify-center text-white text-center p-8">
        <div class="bg-yellow-500 text-black p-5 rounded-full mb-6 animate-bounce"><i class="fa-solid fa-wrench text-4xl"></i></div>
        <h1 class="text-3xl font-black italic mb-2 tracking-tighter">SERVER DOWN</h1>
        <p class="text-slate-400 text-sm">Update চলছে। কিছুক্ষণের মধ্যে আমরা ফিরছি!</p>
    </div>

    <header class="sticky top-0 z-[1000] p-5 flex justify-between items-center bg-white border-b">
        <div>
            <h1 class="text-2xl font-black italic text-slate-800 leading-none">EVO X <span class="text-yellow-500">PRO</span></h1>
            <p class="text-[8px] font-bold text-slate-400 tracking-widest uppercase">Elite Gaming Hub</p>
        </div>
        <div id="user-header">
            <button onclick="login()" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition">Login</button>
        </div>
    </header>

    <div id="home" class="page active p-5">
        <div class="rounded-[2.5rem] overflow-hidden shadow-2xl mb-6 h-48 bg-slate-100 border-4 border-white">
            <img id="main-banner" src="https://via.placeholder.com/800x400?text=Tournament+Banner" class="w-full h-full object-cover">
        </div>
        
        <div class="bg-slate-900 text-white p-2.5 rounded-2xl mb-6 flex items-center gap-3">
            <span class="bg-yellow-500 text-black text-[8px] px-2 py-1 rounded font-black">NEWS</span>
            <marquee id="notice" class="text-xs font-bold italic">Welcome to EVO X PRO Tournament Platform!</marquee>
        </div>

        <h2 class="font-black text-lg mb-4 italic uppercase text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-fire text-orange-500"></i> Select Game Mode
        </h2>
        <div class="grid grid-cols-2 gap-4" id="category-grid"></div>
    </div>

    <div id="match-details" class="page p-5">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showP('home')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-800 active:scale-90"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="match-cat-title" class="text-xl font-black italic uppercase">Matches</h2>
        </div>
        <div id="matches-container" class="space-y-4"></div>
    </div>

    <div id="wallet" class="page p-6">
        <div class="bg-slate-900 rounded-[3rem] p-10 text-white text-center mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <i class="fa-solid fa-wallet text-9xl -rotate-12 translate-x-40 translate-y-10"></i>
            </div>
            <div id="my-short-id" class="inline-block bg-yellow-500/20 text-yellow-500 font-black text-[10px] px-4 py-1.5 rounded-full mb-4 border border-yellow-500/30 tracking-widest">ID: -----</div>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Your Balance</p>
            <h1 class="text-5xl font-black italic">৳<span id="u-bal">0.00</span></h1>
        </div>

        <div class="flex gap-2 mb-6 bg-slate-100 p-2 rounded-2xl">
            <button onclick="switchTab('dep-tab')" id="btn-dep" class="flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase bg-white shadow-md text-slate-800 transition-all">Deposit</button>
            <button onclick="switchTab('wd-tab')" id="btn-wd" class="flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase text-slate-400 transition-all">Withdraw</button>
        </div>

        <div id="dep-tab" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100 mb-6 text-center">
                    <p class="text-[9px] font-black text-blue-400 uppercase mb-1">Bkash/Nagad Personal</p>
                    <h3 id="adm-num-dep" class="text-2xl font-black text-slate-800 tracking-widest italic">01XXXXXXXXX</h3>
                </div>
                <input type="number" id="dep-amt" placeholder="Enter Amount" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none mb-3 font-bold focus:border-yellow-500 transition">
                <input type="text" id="dep-trx" placeholder="TrxID (Transaction ID)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none mb-6 font-bold focus:border-yellow-500 transition">
                <button onclick="moneyRequest('Deposit')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase shadow-xl active:scale-95 transition">Submit Request</button>
            </div>
        </div>

        <div id="wd-tab" class="tab-content hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <input type="number" id="wd-amt" placeholder="Withdraw Amount" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none mb-3 font-bold">
                <input type="text" id="wd-num" placeholder="Your Number" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none mb-6 font-bold">
                <button onclick="moneyRequest('Withdraw')" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black text-[11px] uppercase shadow-xl active:scale-95 transition">Withdraw Money</button>
            </div>
        </div>
    </div>

    <div id="admin" class="page p-6">
        <h2 class="text-2xl font-black mb-8 italic uppercase text-slate-800"><i class="fa-solid fa-shield-halved text-yellow-500"></i> Admin Panel</h2>
        <div class="space-y-6">
            <div class="p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100">
                <h4 class="text-[10px] font-black uppercase mb-4 text-slate-400 tracking-widest">Search Member</h4>
                <div class="flex gap-2">
                    <input type="text" id="s-id" placeholder="User Short ID" class="flex-1 p-3.5 border rounded-xl font-bold outline-none focus:border-black transition">
                    <button onclick="searchUser()" class="bg-black text-white px-6 rounded-xl shadow-lg active:scale-90"><i class="fa-solid fa-search"></i></button>
                </div>
                <div id="res-div" class="hidden mt-4 p-4 bg-white border-2 border-yellow-500/20 rounded-2xl">
                    <p id="res-name" class="text-xs font-black mb-3"></p>
                    <div class="flex gap-2">
                        <input type="number" id="add-amt" placeholder="Amount" class="w-full p-2.5 border rounded-lg font-bold">
                        <button onclick="addCashDirect()" class="bg-green-600 text-white px-6 rounded-lg font-black text-[10px] shadow-md">ADD</button>
                    </div>
                </div>
            </div>
            <div class="p-6 border-2 border-slate-100 rounded-[2.5rem] space-y-4">
                <button id="srv-btn" onclick="toggleSrv()" class="w-full py-4 rounded-2xl font-black text-[11px] border-2 uppercase transition-all"></button>
                <input type="text" id="adm-num-input" placeholder="New Payment Number" class="w-full p-3.5 border rounded-xl font-bold">
                <button onclick="updateSettings('number', 'adm-num-input')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[11px] shadow-lg active:scale-95">UPDATE SYSTEM</button>
            </div>
            <div id="adm-req-list" class="space-y-3"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 bg-white border-t flex justify-around p-4 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <div class="nav-item active flex flex-col items-center cursor-pointer text-slate-300" onclick="showP('home', this)"><i class="fa-solid fa-gamepad text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Play</span></div>
        <div class="nav-item flex flex-col items-center cursor-pointer text-slate-300" onclick="showP('wallet', this)"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Wallet</span></div>
        <div class="nav-item flex flex-col items-center cursor-pointer text-slate-300" onclick="adminLogin()"><i class="fa-solid fa-user-shield text-xl"></i><span class="text-[9px] font-black mt-1 uppercase">Admin</span></div>
    </nav>
</div>

<script>
    // --- ⚙️ FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyDEvBk9SoVR7FNv-rXhEHsZXSBA74Ts9Ic",
      authDomain: "evo-x-tournament.firebaseapp.com",
      databaseURL: "https://evo-x-tournament-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "evo-x-tournament",
      storageBucket: "evo-x-tournament.firebasestorage.app",
      messagingSenderId: "490738768100",
      appId: "1:490738768100:web:2935ee46b163069dee74f1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let myData = null, myUID = null, targetUID = null;

    // --- 🔐 AUTH ---
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(res => {
            const u = res.user;
            db.ref('users/' + u.uid).once('value', s => {
                if(!s.exists()) {
                    db.ref('app_stats/last_id').transaction((id) => (id || 78899) + 1, (err, com, snap) => {
                        if(com) {
                            const newId = snap.val().toString();
                            db.ref('users/' + u.uid).set({ name: u.displayName, balance: 0, shortId: newId, photo: u.photoURL, uid: u.uid });
                            db.ref('id_map/' + newId).set(u.uid);
                            location.reload();
                        }
                    });
                } else { location.reload(); }
            });
        }).catch(err => console.log(err));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            myUID = user.uid;
            db.ref('users/' + user.uid).on('value', s => {
                myData = s.val() || {};
                document.getElementById('u-bal').innerText = (myData.balance || 0).toFixed(2);
                document.getElementById('my-short-id').innerText = "ID: " + (myData.shortId || "-----");
                document.getElementById('user-header').innerHTML = `<img src="${user.photoURL}" class="w-10 h-10 rounded-full border-2 border-yellow-500 shadow-md">`;
            });
        }
    });

    // --- 🛰️ LIVE DATA ---
    db.ref('settings').on('value', snap => {
        const d = snap.val() || {};
        document.getElementById('m-ui').classList.toggle('hidden', d.server !== 'off');
        document.getElementById('notice').innerText = d.notice || "Welcome to EVO X PRO!";
        document.getElementById('adm-num-dep').innerText = d.number || "01XXX-XXXXXX";
        
        const btn = document.getElementById('srv-btn');
        if(btn) {
            const isOff = (d.server === 'off');
            btn.innerText = "SERVER: " + (isOff ? "OFFLINE" : "ONLINE");
            btn.className = isOff ? 
                "w-full py-4 rounded-2xl font-black text-[10px] bg-red-50 text-red-600 border-red-200" : 
                "w-full py-4 rounded-2xl font-black text-[10px] bg-green-50 text-green-600 border-green-200";
        }
    });

    // --- 🎮 GRID ---
    const categories = [
        { name: "Lone Wolf 1v1", img: "https://via.placeholder.com/300x180?text=Lone+Wolf" },
        { name: "BR Solo Classic", img: "https://via.placeholder.com/300x180?text=BR+Solo" },
        { name: "Duo Custom", img: "https://via.placeholder.com/300x180?text=Duo+Custom" }
    ];
    const catGrid = document.getElementById('category-grid');
    categories.forEach(c => {
        catGrid.innerHTML += `
        <div class="bg-white p-4 rounded-[2.5rem] border shadow-sm cursor-pointer active:scale-95 transition" onclick="openMatches('${c.name}')">
            <img src="${c.img}" class="w-full h-24 object-cover rounded-3xl mb-3 shadow-inner">
            <h4 class="text-[10px] font-black text-center uppercase text-slate-800">${c.name}</h4>
        </div>`;
    });

    function openMatches(cat) {
        showP('match-details');
        document.getElementById('match-cat-title').innerText = cat;
        document.getElementById('matches-container').innerHTML = "<p class='text-center text-[10px] py-10 font-bold text-slate-400'>Loading matches...</p>";
    }

    // --- 🛡️ ADMIN CORE ---
    function adminLogin() {
        const p = prompt("Admin Key:");
        if(p === "tawsif728027") showP('admin');
    }

    function searchUser() {
        const sid = document.getElementById('s-id').value;
        db.ref('id_map/' + sid).once('value', s => {
            const uid = s.val();
            if(!uid) return alert("Member Not Found!");
            targetUID = uid;
            db.ref('users/' + uid).once('value', us => {
                const ud = us.val();
                document.getElementById('res-div').classList.remove('hidden');
                document.getElementById('res-name').innerText = ud.name + " (Bal: ৳" + ud.balance + ")";
            });
        });
    }

    function addCashDirect() {
        const amt = Number(document.getElementById('add-amt').value);
        if(!targetUID || isNaN(amt)) return;
        db.ref('users/' + targetUID + '/balance').transaction(b => (b || 0) + amt);
        alert("Balance Added!"); searchUser();
    }

    function toggleSrv() {
        db.ref('settings/server').once('value', s => {
            db.ref('settings/server').set(s.val() === 'on' ? 'off' : 'on');
        });
    }

    function updateSettings(k, i) {
        const v = document.getElementById(i).value;
        if(v) db.ref('settings/' + k).set(v).then(() => alert("Saved!"));
    }

    // --- 📄 NAVIGATION ---
    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-slate-800'));
        if(el) el.classList.add('active', 'text-slate-800');
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-dep').className = id==='dep-tab' ? "flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase bg-white shadow-md text-slate-800" : "flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase text-slate-400";
        document.getElementById('btn-wd').className = id==='wd-tab' ? "flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase bg-white shadow-md text-slate-800" : "flex-1 py-3.5 rounded-xl font-black text-[10px] uppercase text-slate-400";
    }

    function moneyRequest(type) {
        if(!myUID) return login();
        const amt = Number(document.getElementById(type==='Deposit'?'dep-amt':'wd-amt').value);
        const info = document.getElementById(type==='Deposit'?'dep-trx':'wd-num').value;
        if(amt < 10 || !info) return alert("সব তথ্য সঠিক দিন!");
        db.ref('money_requests').push({ uid: myUID, shortId: myData.shortId, amount: amt, info: info, type, status: 'pending', time: Date.now() });
        alert(type + " Request Sent!");
    }
</script>
</body>
</html>
